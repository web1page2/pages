<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Web Page</title>
        <link rel="stylesheet" href="styles.css">
        <style>
            .sub-container {
                display: flex;
                flex-wrap: wrap;
                justify-content: left;
                gap: 20px;
                padding: 20px;
            }
            .sub-container h3 {
                width: 100%;
                margin-bottom: 10px;
            }
            .sub-container a {
                text-decoration: none;
                color: inherit;
            }
            .sub-container img {
                width: 50px;
                height: 50px;
                object-fit: contain;
            }
            .tooltip {
                position: relative;
                display: inline-block;
                border-bottom: 1px dotted black;
                cursor: pointer;
            }
            .tooltiptext {
                visibility: hidden;
                background-color: black;
                color: #ffffff;
                text-align: center;
                padding: 5px 0;
                border-radius: 5px;
                position: absolute;
                top: 100%;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1;
            }
            .tooltip:hover .tooltiptext {
                visibility: visible;
            }
            .tooltiptext::after {
                content: " ";
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%);
                border-width: 5px;
                border-style: solid;
                border-color: transparent transparent black transparent;
            }
        </style>
    </head>
    <body>
        <div id="container">
        </div>

        <script>

                            tooltip: 'Codeforces'
                        }
                    ]
                }
            ];

            let container = document.getElementById('container');
            links.forEach(category => {
                let subContainer = document.createElement('div');
                subContainer.classList.add('sub-container');
                subContainer.innerHTML = `<h3>${category.type.replace(/-/g, ' ')}</h3>`;

                category.links.forEach(link => {
                    let linkElement = document.createElement('a');
                    linkElement.classList.add('tooltip');
                    linkElement.href = link.url;
                    linkElement.target = '_blank';
                    linkElement.innerHTML = `
                        <div class="tooltip">
                            <img src="${link.img}" alt="${link.name}">
                            <span class="tooltiptext">${link.tooltip}</span>
                        </div>
                    `;
                    subContainer.appendChild(linkElement);
                });

                container.appendChild(subContainer);
            });

        </script>
    </body>
</html>
